openapi: 3.0.3
info:
  title: SIC API
  version: 0.1.0
  description: Implementation of accounting system based in hordak and following SIC
    (Andrisani) definitions.
  contact:
    name: gastong256
paths:
  /api/v1/accounts/chart/:
    get:
      operationId: get_global_chart
      description: Returns the base chart of accounts (rubros and colectivas — levels
        1 and 2). This is the shared, global plan with no company-specific subcuentas.
      summary: Get global chart of accounts
      tags:
      - accounts
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Nested account tree (level 0 and 1)
        '401':
          description: Authentication required
  /api/v1/accounts/company/{company_id}/:
    get:
      operationId: get_company_chart
      description: 'Returns the full chart of accounts for the given company: global
        levels 1 and 2, plus the company''s own level-3 subcuentas.'
      summary: Get company chart of accounts
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Nested account tree for the company
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
    post:
      operationId: create_company_account
      description: Creates a new subcuenta (level-3 account) under the given colectiva
        (level-2 parent). Type and currency are inherited from the parent. Code must
        follow X.XX.XX format and be globally unique.
      summary: Create a level-3 account for a company
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          description: Created account node
        '400':
          description: Validation error
        '409':
          description: Read-only demo company
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company or parent not found
  /api/v1/accounts/company/{company_id}/{account_id}/:
    patch:
      operationId: update_company_account
      description: Update the name and/or code of a company-owned level-3 account.
      summary: Update a level-3 account
      parameters:
      - in: path
        name: account_id
        schema:
          type: integer
        required: true
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccountUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Updated account node
        '400':
          description: Validation error
        '409':
          description: Read-only demo company
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company or account not found
    delete:
      operationId: delete_company_account
      description: Delete a company-owned level-3 account. Returns 409 Conflict if
        the account has existing transaction legs.
      summary: Delete a level-3 account
      parameters:
      - in: path
        name: account_id
        schema:
          type: integer
        required: true
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - accounts
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No content
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company or account not found
        '409':
          description: Account has existing transactions
  /api/v1/accounts/visibility/:
    get:
      operationId: list_account_visibility_chart
      summary: Get account visibility overrides
      tags:
      - account-visibility
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Level-0/1 tree with is_visible flags
  /api/v1/accounts/visibility/{account_id}/:
    patch:
      operationId: update_account_visibility_override
      summary: Set account visibility override
      parameters:
      - in: path
        name: account_id
        schema:
          type: integer
        required: true
      tags:
      - account-visibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccountVisibilityUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Updated visibility tree
  /api/v1/accounts/visibility/batch/:
    patch:
      operationId: batch_update_account_visibility_overrides
      summary: Batch set account visibility overrides
      tags:
      - account-visibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccountVisibilityBulkUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Updated visibility tree
  /api/v1/accounts/visibility/bootstrap/:
    get:
      operationId: bootstrap_account_visibility_chart
      summary: Bootstrap account visibility management
      parameters:
      - in: query
        name: teacher_id
        schema:
          type: integer
      tags:
      - account-visibility
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountVisibilityBootstrap'
          description: ''
  /api/v1/admin/registration-code/:
    get:
      operationId: admin_get_registration_code
      summary: Get current registration code
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationCodeInfo'
          description: ''
  /api/v1/admin/registration-code/rotate/:
    post:
      operationId: rotate_registration_code
      summary: Rotate registration code
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationCodeInfo'
          description: ''
  /api/v1/admin/users/:
    get:
      operationId: admin_list_users
      summary: List users
      parameters:
      - in: query
        name: all
        schema:
          type: boolean
        description: Return the full list in one response.
      - in: query
        name: page
        schema:
          type: integer
        description: Pagination page number.
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - student
          - teacher
        description: Filter users by role.
      - in: query
        name: search
        schema:
          type: string
        description: Case-insensitive username search.
      - in: query
        name: summary
        schema:
          type: string
          enum:
          - selector
        description: Return a lightweight item shape for selectors.
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListPaginated'
          description: ''
  /api/v1/admin/users/{user_id}/role/:
    patch:
      operationId: admin_update_user_role
      summary: Update user role
      parameters:
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRoleUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: get_me
      summary: Get current user
      parameters:
      - in: query
        name: include
        schema:
          type: string
        description: 'Comma-separated extra sections to include. Supported values:
          companies, capabilities, registration_code.'
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: ''
    patch:
      operationId: update_me
      summary: Update current user profile
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: register_student
      summary: Register new student user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: Validation error
        '429':
          description: Rate limited or cooldown active
  /api/v1/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StableTokenRefresh'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StableTokenRefresh'
          description: ''
  /api/v1/companies/:
    get:
      operationId: list_companies
      summary: List companies
      parameters:
      - in: query
        name: all
        schema:
          type: boolean
        description: Return the full list in one response.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: summary
        schema:
          type: string
          enum:
          - selector
        description: Return a lightweight item shape for selectors.
      tags:
      - companies
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyList'
          description: ''
    post:
      operationId: create_company
      summary: Create a company
      tags:
      - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
        '400':
          description: Validation error
  /api/v1/companies/{company_id}/closing/execute/:
    post:
      operationId: execute_company_simplified_closing
      summary: Execute the simplified accounting closing
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimplifiedClosingRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimplifiedClosingExecute'
          description: ''
        '403':
          description: Permission denied
        '409':
          description: Closing cannot be executed for the selected dates
  /api/v1/companies/{company_id}/closing/latest-snapshot/:
    get:
      operationId: get_latest_company_closing_snapshot
      summary: Get the latest immutable closing snapshot for a company
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClosingSnapshot'
          description: ''
  /api/v1/companies/{company_id}/closing/preview/:
    post:
      operationId: preview_company_simplified_closing
      summary: Preview the simplified accounting closing plan
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimplifiedClosingRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimplifiedClosingPreview'
          description: ''
        '403':
          description: Permission denied
        '409':
          description: Closing cannot be prepared for the selected dates
  /api/v1/companies/{company_id}/closing/snapshots/{snapshot_id}/:
    get:
      operationId: get_company_closing_snapshot
      summary: Get an immutable closing snapshot by ID
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: path
        name: snapshot_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClosingSnapshot'
          description: ''
  /api/v1/companies/{company_id}/closing/state/:
    get:
      operationId: get_company_closing_state
      summary: Get simplified closing state for a company
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimplifiedClosingState'
          description: ''
  /api/v1/companies/{company_id}/journal/:
    get:
      operationId: list_journal_entries
      description: Returns paginated journal entries for the company ordered by
        most recent entry number first.
      summary: List journal entries
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: page
        schema:
          type: integer
        description: Pagination page number.
      tags:
      - journal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryListPaginated'
          description: ''
        '409':
          description: Company must be opened before journal is available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
    post:
      operationId: create_journal_entry
      description: Creates a new journal entry and immediately posts it. Debits must
        equal credits. All accounts must belong to this company.
      summary: Create and post a journal entry
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - journal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryDetail'
          description: ''
        '400':
          description: Validation or business rule error
        '409':
          description: Company not opened, closed period, read-only demo company,
            or concurrent conflict
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
  /api/v1/companies/{company_id}/journal/{entry_id}/:
    get:
      operationId: get_journal_entry
      description: Returns full detail of a journal entry including all lines.
      summary: Retrieve a journal entry
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: path
        name: entry_id
        schema:
          type: integer
        required: true
      tags:
      - journal
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryDetail'
          description: ''
        '409':
          description: Company must be opened before journal is available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company or entry not found
  /api/v1/companies/{company_id}/journal/{entry_id}/reverse/:
    post:
      operationId: reverse_journal_entry
      description: Creates a full contra-entry (debits<->credits) and links it to
        the original entry.
      summary: Reverse a journal entry
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: path
        name: entry_id
        schema:
          type: integer
        required: true
      tags:
      - journal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryReverse'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryDetail'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company or entry not found
        '409':
          description: Company not opened, already reversed, closed period, or read-only
            demo company
  /api/v1/companies/{company_id}/logical-exercises/:
    get:
      operationId: list_company_logical_exercises
      summary: List inferred logical fiscal exercises for a company
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - closing
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalExerciseList'
          description: ''
  /api/v1/companies/{company_id}/reports/journal-book/:
    get:
      operationId: get_journal_book
      description: Chronological list of all posted journal entries for the company
        within the given date range, including all lines and grand totals.
      summary: Libro Diario
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: date_from
        schema:
          type: string
        description: Start date (YYYY-MM-DD). Defaults to the earliest entry date.
      - in: query
        name: date_to
        schema:
          type: string
        description: End date (YYYY-MM-DD). Defaults to today.
      tags:
      - reports
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Libro Diario report
        '400':
          description: Invalid query parameters
        '409':
          description: Company must be opened before reports are available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
  /api/v1/companies/{company_id}/reports/journal-book.xlsx:
    get:
      operationId: export_journal_book_xlsx
      summary: Export Libro Diario (XLSX)
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: date_from
        schema:
          type: string
        description: Start date (YYYY-MM-DD). Defaults to the earliest entry date.
      - in: query
        name: date_to
        schema:
          type: string
        description: End date (YYYY-MM-DD). Defaults to today.
      tags:
      - reports
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: XLSX file
        '400':
          description: Invalid query parameters
        '409':
          description: Company must be opened before reports are available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
  /api/v1/companies/{company_id}/reports/ledger/:
    get:
      operationId: get_ledger
      description: One card per level-3 account belonging to the company, showing
        every movement in the period chronologically with a running balance. Optionally
        filtered to a single account via account_id.
      summary: Libro Mayor
      parameters:
      - in: query
        name: account_id
        schema:
          type: integer
        description: Filter to a single level-3 account by its ID.
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: date_from
        schema:
          type: string
        description: Start date (YYYY-MM-DD). Defaults to the earliest entry date.
      - in: query
        name: date_to
        schema:
          type: string
        description: End date (YYYY-MM-DD). Defaults to today.
      - in: query
        name: include
        schema:
          type: string
        description: 'Optional extra sections. Supported values: account_options.'
      tags:
      - reports
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Libro Mayor report
        '400':
          description: Invalid query parameters or account_id
        '409':
          description: Company must be opened before reports are available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
  /api/v1/companies/{company_id}/reports/ledger.xlsx:
    get:
      operationId: export_ledger_xlsx
      summary: Export Libro Mayor (XLSX)
      parameters:
      - in: query
        name: account_id
        schema:
          type: integer
        description: Filter to a single level-3 account by its ID.
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: date_from
        schema:
          type: string
        description: Start date (YYYY-MM-DD). Defaults to the earliest entry date.
      - in: query
        name: date_to
        schema:
          type: string
        description: End date (YYYY-MM-DD). Defaults to today.
      tags:
      - reports
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: XLSX file
        '400':
          description: Invalid query parameters or account_id
        '409':
          description: Company must be opened before reports are available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
  /api/v1/companies/{company_id}/reports/trial-balance/:
    get:
      operationId: get_trial_balance
      description: 'Two-level table: level-2 (colectiva) subtotal rows containing
        level-3 (subcuenta) rows, with total_debit, total_credit, and balance columns.
        Only accounts with movements in the period are included.'
      summary: Balance de Comprobación
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      - in: query
        name: date_from
        schema:
          type: string
        description: Start date (YYYY-MM-DD). Defaults to the earliest entry date.
      - in: query
        name: date_to
        schema:
          type: string
        description: End date (YYYY-MM-DD). Defaults to today.
      tags:
      - reports
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Balance de Comprobación report
        '400':
          description: Invalid query parameters
        '409':
          description: Company must be opened before reports are available
        '401':
          description: Authentication required
        '403':
          description: Not the company owner or teacher
        '404':
          description: Company not found
