components:
  schemas:
    AccountCreate:
      type: object
      properties:
        name:
          type: string
          description: Human-readable account name.
          maxLength: 255
        code:
          type: string
          description: Full account code in format X.XX.XX (e.g. 1.04.01).
          maxLength: 10
        parent_id:
          type: integer
          description: ID of the parent level-2 account (colectiva).
      required:
      - code
      - name
      - parent_id
    AvailableStudent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
      required:
      - first_name
      - full_name
      - id
      - last_name
      - username
    AvailableStudentsPaginatedResponse:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/AvailableStudent'
      required:
      - count
      - next
      - previous
      - results
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        tax_id:
          type: string
          description: Simulated CUIT (optional).
          maxLength: 20
        owner_username:
          type: string
          readOnly: true
        account_count:
          type: integer
          readOnly: true
        books_closed_until:
          type: string
          format: date
          readOnly: true
          nullable: true
          description: Entries on or before this date are locked.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_count
      - books_closed_until
      - created_at
      - id
      - name
      - owner_username
      - updated_at
    CompanyWrite:
      type: object
      properties:
        name:
          type: string
          description: Company name.
          maxLength: 255
        tax_id:
          type: string
          default: ''
          description: Simulated CUIT (optional).
          maxLength: 20
      required:
      - name
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        code:
          type: string
          readOnly: true
          nullable: true
        teacher_id:
          type: integer
          readOnly: true
        teacher_username:
          type: string
          readOnly: true
        student_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - student_count
      - teacher_id
      - teacher_username
      - updated_at
    CourseWrite:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 50
        teacher_id:
          type: integer
          minimum: 1
      required:
      - name
    Enrollment:
      type: object
      properties:
        student_id:
          type: integer
          readOnly: true
        student_username:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - student_id
      - student_username
    EnrollmentCreate:
      type: object
      properties:
        student_id:
          type: integer
          minimum: 1
      required:
      - student_id
    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    ItemCreate:
      type: object
      properties:
        name:
          type: string
          description: Human-readable item name.
          maxLength: 255
        description:
          type: string
          default: ''
          description: Optional description.
      required:
      - name
    JournalEntryCreate:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Accounting date of the entry.
        description:
          type: string
          description: Glosa / description of the entry.
          maxLength: 500
        source_type:
          allOf:
          - $ref: '#/components/schemas/SourceTypeEnum'
          default: MANUAL
        source_ref:
          type: string
          default: ''
          description: E.g. "Factura A-0001".
          maxLength: 100
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntryLineWrite'
          description: At least one DEBIT and one CREDIT line, balanced.
      required:
      - date
      - description
      - lines
    JournalEntryDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        entry_number:
          type: integer
          readOnly: true
          title: Número de asiento
          description: Correlativo por empresa, asignado automáticamente.
        date:
          type: string
          format: date
          readOnly: true
          title: Fecha
        description:
          type: string
          readOnly: true
          title: Descripción
        source_type:
          allOf:
          - $ref: '#/components/schemas/SourceTypeEnum'
          readOnly: true
          title: Tipo de comprobante
        source_ref:
          type: string
          readOnly: true
          title: Referencia
          description: 'Ej.: "Factura A-0001", "Recibo 00123".'
        created_by:
          type: string
          readOnly: true
        reversal_of_id:
          type: integer
          readOnly: true
        reversed_by_id:
          type: integer
          nullable: true
          readOnly: true
        total_debit:
          type: number
          format: double
          readOnly: true
        total_credit:
          type: number
          format: double
          readOnly: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntryLineRead'
          readOnly: true
      required:
      - created_by
      - date
      - description
      - entry_number
      - id
      - lines
      - reversal_of_id
      - reversed_by_id
      - source_ref
      - source_type
      - total_credit
      - total_debit
    JournalEntryLineRead:
      type: object
      properties:
        account_id:
          type: integer
          title: Cuenta
          readOnly: true
        account_code:
          type: string
          readOnly: true
        account_name:
          type: string
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          readOnly: true
          title: Tipo
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          readOnly: true
          title: Importe
      required:
      - account_code
      - account_id
      - account_name
      - amount
      - type
    JournalEntryLineWrite:
      type: object
      properties:
        account_id:
          type: integer
          description: ID of the level-3 account.
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          description: |-
            DEBIT or CREDIT.

            * `DEBIT` - Deudora
            * `CREDIT` - Acreedora
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          description: Positive amount.
      required:
      - account_id
      - amount
      - type
    JournalEntryList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        entry_number:
          type: integer
          readOnly: true
          title: Número de asiento
          description: Correlativo por empresa, asignado automáticamente.
        date:
          type: string
          format: date
          readOnly: true
          title: Fecha
        description:
          type: string
          readOnly: true
          title: Descripción
        source_type:
          allOf:
          - $ref: '#/components/schemas/SourceTypeEnum'
          readOnly: true
          title: Tipo de comprobante
        source_ref:
          type: string
          readOnly: true
          title: Referencia
          description: 'Ej.: "Factura A-0001", "Recibo 00123".'
        created_by:
          type: string
          readOnly: true
        reversal_of_id:
          type: integer
          readOnly: true
        reversed_by_id:
          type: integer
          nullable: true
          readOnly: true
        total_debit:
          type: number
          format: double
          readOnly: true
        total_credit:
          type: number
          format: double
          readOnly: true
      required:
      - created_by
      - date
      - description
      - entry_number
      - id
      - reversal_of_id
      - reversed_by_id
      - source_ref
      - source_type
      - total_credit
      - total_debit
    JournalEntryReverse:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date for the reversal entry.
        description:
          type: string
          description: Optional description for the reversal entry.
          maxLength: 500
    PaginatedCompanyList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Company'
    PatchedAccountUpdate:
      type: object
      properties:
        name:
          type: string
          description: New account name.
          maxLength: 255
        code:
          type: string
          description: New full account code in format X.XX.XX (e.g. 1.04.02).
          maxLength: 10
    PatchedAccountVisibilityUpdate:
      type: object
      properties:
        is_visible:
          type: boolean
        teacher_id:
          type: integer
          minimum: 1
    PatchedCompanyWrite:
      type: object
      properties:
        name:
          type: string
          description: Company name.
          maxLength: 255
        tax_id:
          type: string
          default: ''
          description: Simulated CUIT (optional).
          maxLength: 20
    PatchedCourseWrite:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 50
        teacher_id:
          type: integer
          minimum: 1
    PatchedUserRoleUpdate:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
    PatchedUserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
    RegistrationCodeInfo:
      type: object
      properties:
        code:
          type: string
        window_minutes:
          type: integer
        allow_previous_window:
          type: boolean
        valid_from:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
      required:
      - allow_previous_window
      - code
      - valid_from
      - valid_until
      - window_minutes
    RoleEnum:
      enum:
      - admin
      - teacher
      - student
      type: string
      description: |-
        * `admin` - Admin
        * `teacher` - Teacher
        * `student` - Student
    SourceTypeEnum:
      enum:
      - MANUAL
      - INVOICE
      - RECEIPT
      - OTHER
      type: string
      description: |-
        * `MANUAL` - Manual
        * `INVOICE` - Factura
        * `RECEIPT` - Recibo
        * `OTHER` - Otro
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    TeacherCompanyItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tax_id:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - name
      - tax_id
    TeacherCourseCompaniesResponse:
      type: object
      properties:
        course_id:
          type: integer
        course_name:
          type: string
        students:
          type: array
          items:
            $ref: '#/components/schemas/TeacherStudentCompanies'
      required:
      - course_id
      - course_name
      - students
    TeacherCourseJournalEntriesResponse:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/TeacherCourseJournalEntry'
      required:
      - count
      - next
      - previous
      - results
    TeacherCourseJournalEntry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        entry_number:
          type: integer
          readOnly: true
          title: Número de asiento
          description: Correlativo por empresa, asignado automáticamente.
        date:
          type: string
          format: date
          readOnly: true
          title: Fecha
        description:
          type: string
          readOnly: true
          title: Descripción
        source_type:
          allOf:
          - $ref: '#/components/schemas/SourceTypeEnum'
          readOnly: true
          title: Tipo de comprobante
        source_ref:
          type: string
          readOnly: true
          title: Referencia
          description: 'Ej.: "Factura A-0001", "Recibo 00123".'
        company_id:
          type: integer
          readOnly: true
        company_name:
          type: string
          readOnly: true
        student_id:
          type: integer
          readOnly: true
        student_username:
          type: string
          readOnly: true
        created_by:
          type: string
          readOnly: true
        reversal_of_id:
          type: integer
          readOnly: true
        reversed_by_id:
          type: integer
          nullable: true
          readOnly: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntryLineRead'
          readOnly: true
      required:
      - company_id
      - company_name
      - created_by
      - date
      - description
      - entry_number
      - id
      - lines
      - reversal_of_id
      - reversed_by_id
      - source_ref
      - source_type
      - student_id
      - student_username
    TeacherStudentCompanies:
      type: object
      properties:
        student_id:
          type: integer
        student_username:
          type: string
        student_full_name:
          type: string
        companies:
          type: array
          items:
            $ref: '#/components/schemas/TeacherCompanyItem'
      required:
      - companies
      - student_full_name
      - student_id
      - student_username
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TypeEnum:
      enum:
      - DEBIT
      - CREDIT
      type: string
      description: |-
        * `DEBIT` - Deudora
        * `CREDIT` - Acreedora
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        is_staff:
          type: boolean
          readOnly: true
          title: Staff status
          description: Designates whether the user can log into this admin site.
        role:
          type: string
          readOnly: true
        course_id:
          type: integer
          nullable: true
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - course_id
      - date_joined
      - email
      - first_name
      - id
      - is_staff
      - last_name
      - role
      - username
    UserListPaginated:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
      - count
      - next
      - previous
      - results
    UserRegister:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 8
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        registration_code:
          type: string
          maxLength: 32
      required:
      - password
      - password_confirm
      - registration_code
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
