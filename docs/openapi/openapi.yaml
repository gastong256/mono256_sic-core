components:
  schemas:
    AccountCreate:
      type: object
      properties:
        name:
          type: string
          description: Human-readable account name.
          maxLength: 255
        code:
          type: string
          description: Full account code in format X.XX.XX (e.g. 1.04.01).
          maxLength: 10
        parent_id:
          type: integer
          description: ID of the parent level-2 account (colectiva).
      required:
      - code
      - name
      - parent_id
    AccountVisibilityBootstrap:
      type: object
      properties:
        selected_teacher_id:
          type: integer
          nullable: true
        teachers:
          type: array
          items:
            type: object
            additionalProperties: {}
        chart:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - chart
      - selected_teacher_id
      - teachers
    AccountVisibilityBulkItem:
      type: object
      properties:
        account_id:
          type: integer
          minimum: 1
        is_visible:
          type: boolean
      required:
      - account_id
      - is_visible
    AvailableStudent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
      required:
      - first_name
      - full_name
      - id
      - last_name
      - username
    AvailableStudentsPaginatedResponse:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/AvailableStudent'
      required:
      - count
      - next
      - previous
      - results
    ClosingSnapshot:
      type: object
      properties:
        id:
          type: integer
        company_id:
          type: integer
        company:
          type: string
        patrimonial_closing_entry_id:
          type: integer
        reopening_entry_id:
          type: integer
        closing_date:
          type: string
          format: date
        reopening_date:
          type: string
          format: date
        balance_sheet:
          type: object
          additionalProperties: {}
        income_statement:
          type: object
          additionalProperties: {}
        lines:
          type: array
          items:
            $ref: '#/components/schemas/ClosingSnapshotLine'
      required:
      - balance_sheet
      - closing_date
      - company
      - company_id
      - id
      - income_statement
      - lines
      - patrimonial_closing_entry_id
      - reopening_date
      - reopening_entry_id
    ClosingSnapshotLine:
      type: object
      properties:
        account_id:
          type: integer
          nullable: true
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
        root_code:
          type: string
        parent_code:
          type: string
        debit_balance:
          type: string
        credit_balance:
          type: string
      required:
      - account_code
      - account_id
      - account_name
      - account_type
      - credit_balance
      - debit_balance
      - parent_code
      - root_code
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
          description: Optional business description for a more realistic simulation.
        tax_id:
          type: string
          description: Simulated CUIT (optional).
          maxLength: 20
        owner_username:
          type: string
          readOnly: true
        account_count:
          type: integer
          readOnly: true
        books_closed_until:
          type: string
          format: date
          readOnly: true
          nullable: true
          description: Entries on or before this date are locked.
        is_demo:
          type: boolean
          readOnly: true
          description: Marks a seeded demo company shared across the system.
        is_read_only:
          type: boolean
          readOnly: true
          description: If true, accounting writes and metadata updates are blocked.
        is_published:
          type: boolean
          readOnly: true
          description: Controls whether a demo company is globally visible in the
            application.
        demo_slug:
          type: string
          readOnly: true
          description: Stable slug for imported demo companies.
          pattern: ^[-a-zA-Z0-9_]+$
        has_opening_entry:
          type: boolean
          readOnly: true
        accounting_ready:
          type: boolean
          readOnly: true
        opening_entry_id:
          type: integer
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - account_count
      - accounting_ready
      - books_closed_until
      - created_at
      - demo_slug
      - has_opening_entry
      - id
      - is_demo
      - is_published
      - is_read_only
      - name
      - opening_entry_id
      - owner_username
      - updated_at
    CompanyCreate:
      type: object
      properties:
        name:
          type: string
          description: Company name.
          maxLength: 255
        description:
          type: string
          default: ''
          description: Optional business description.
        tax_id:
          type: string
          default: ''
          description: Simulated CUIT (optional).
          maxLength: 20
        opening_entry:
          allOf:
          - $ref: '#/components/schemas/CompanyOpeningEntry'
          description: Optional balanced opening entry to create the company with
            initial capital/assets.
      required:
      - name
    CompanyOpeningAccountItem:
      type: object
      properties:
        name:
          type: string
          description: Movement-account name to create or reuse for this company.
          maxLength: 255
        parent_code:
          type: string
          description: Parent colectiva code in format X.XX (e.g. 1.01).
          maxLength: 4
        amount:
          type: string
          format: decimal
